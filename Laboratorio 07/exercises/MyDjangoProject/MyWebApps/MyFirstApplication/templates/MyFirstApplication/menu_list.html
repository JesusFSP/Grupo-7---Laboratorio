<!DOCTYPE html>
<html>
<head>
    <title>Menú del Restaurante</title>
</head>
<body>
    <h1>Menú del Restaurante</h1>

    <ul>
        {% for item in items %}
            <li>
                {{ item.item_name }} - S/ {{ item.price }}
            </li>
        {% empty %}
            <li>No hay platos registrados.</li>
        {% endfor %}
    </ul>

    <a href="/">Volver al inicio</a>
</body>
</html>
